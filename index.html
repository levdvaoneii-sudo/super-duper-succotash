<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max 95% Smooth 3D Safari Cards</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #0b0b0b;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3D Сцена */
        .scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* Усилил перспективу для более плавного и глубокого ухода */
            perspective: 2000px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slider-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Слайды (Карточки) */
        .slide {
            position: absolute;
            width: min(95vw, calc(95vh * 16 / 9));
            height: min(95vh, calc(95vw * 9 / 16)); 
            background: #151515;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            
            /* 
               Исходное состояние стопки (сзади).
               Opacity убрана на 1, чтобы блюр красиво перекрывал фон без скачков прозрачности.
               Карточки в стопке просто мельче.
            */
            transform: translate3d(0, -40px, -900px) scale(0.7);
            
            /* Очень мягкая кривая замедления Apple-like для всех переходов */
            transition: transform 0.9s cubic-bezier(0.25, 0.1, 0.25, 1), filter 0.9s cubic-bezier(0.25, 0.1, 0.25, 1);
            pointer-events: none;
            will-change: transform, filter;
        }

        .slide img, .slide video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Активный слайд (на переднем плане) */
        .slide.active {
            transform: translate3d(0, 0, 0) scale(1);
            filter: blur(0px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 10;
            pointer-events: auto;
        }

        /* Слайд, который уходит в стопку */
        .slide.exiting {
            /* 
               Улетает далеко вглубь.
               Добавлен filter: blur(12px) - карточка размывается по мере удаления.
            */
            transform: translate3d(0, 50px, -1400px) scale(0.5);
            filter: blur(12px);
            z-index: 5;
        }

        /* Индикатор - парит поверх контента */
        .indicator-container {
            position: absolute;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.45);
            padding: 8px 16px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            z-index: 20;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .indicator-dot {
            width: 36px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .indicator-dot.active-dot {
            background: rgba(255, 255, 255, 0.2);
        }

        .indicator-dot.active-dot .fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: #ff3b30;
            animation: fillTimer 5s linear forwards;
        }

        .indicator-dot.completed .fill {
            width: 100% !important;
            background: #1a1a1a;
        }

        @keyframes fillTimer {
            from { width: 0%; }
            to { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="slider-wrapper" id="sliderWrapper">
            
            <!-- Слайд 1 -->
            <div class="slide active" data-index="0">
                <!-- ЗАМЕНИТЬ НА oneslide.png -->
                <img src="https://images.unsplash.com/photo-1500462918059-b1a0cb512f1d?w=1920&q=80" alt="Slide 1">
            </div>

            <!-- Слайд 2 -->
            <div class="slide" data-index="1">
                <!-- ЗАМЕНИТЬ НА twoslide.png -->
                <img src="https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=1920&q=80" alt="Slide 2">
            </div>

            <!-- Слайд 3 -->
            <div class="slide" data-index="2">
                <!-- ЗАМЕНИТЬ НА threeslide.png -->
                <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1920&q=80" alt="Slide 3">
            </div>

            <!-- Слайд 4 -->
            <div class="slide" data-index="3">
                <!-- ЗАМЕНИТЬ НА fourslide.png -->
                <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=1920&q=80" alt="Slide 4">
            </div>

            <!-- Слайд 5 (Видео) -->
            <div class="slide" data-index="4">
                <!-- ЗАМЕНИТЬ НА fiveslide.mp4 -->
                <video src="https://www.w3schools.com/html/mov_bbb.mp4" muted loop playsinline style="background:#000;"></video>
            </div>

        </div>

        <!-- Индикатор Таймер -->
        <div class="indicator-container" id="indicatorContainer">
            <div class="indicator-dot active-dot" data-index="0"><div class="fill"></div></div>
            <div class="indicator-dot" data-index="1"><div class="fill"></div></div>
            <div class="indicator-dot" data-index="2"><div class="fill"></div></div>
            <div class="indicator-dot" data-index="3"><div class="fill"></div></div>
            <div class="indicator-dot" data-index="4"><div class="fill"></div></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slides = document.querySelectorAll('.slide');
            const dots = document.querySelectorAll('.indicator-dot');
            const totalSlides = slides.length;
            let slideInterval;

            function goToSlide(index) {
                clearInterval(slideInterval);
                resetTimerAnimations();

                // Убираем текущий в стопку
                const currentActive = document.querySelector('.slide.active');
                if (currentActive) {
                    currentActive.classList.remove('active');
                    currentActive.classList.add('exiting');
                    setTimeout(() => {
                        currentActive.classList.remove('exiting');
                        // Возвращаем в обычное состояние заднего плана без блюра
                        currentActive.style.transform = 'translate3d(0, -40px, -900px) scale(0.7)';
                        currentActive.style.filter = 'blur(0px)';
                    }, 900);
                }

                // Достаем новый
                const nextSlide = slides[index];
                nextSlide.style.transform = ''; 
                nextSlide.style.filter = '';
                nextSlide.classList.add('active');

                updateDots(index);
                startTimer(index);
            }

            function updateDots(activeIndex) {
                dots.forEach(dot => {
                    dot.classList.remove('active-dot', 'completed');
                    const fill = dot.querySelector('.fill');
                    fill.style.animation = 'none';
                    fill.offsetHeight; 
                    fill.style.width = '0%';
                });

                dots[activeIndex].classList.add('active-dot');
                const activeFill = dots[activeIndex].querySelector('.fill');
                activeFill.style.animation = `fillTimer 5s linear forwards`;
            }

            function resetTimerAnimations() {
                dots.forEach(dot => {
                    const fill = dot.querySelector('.fill');
                    fill.style.animation = 'none';
                    fill.style.width = '0%';
                });
            }

            function startTimer(index) {
                slideInterval = setTimeout(() => {
                    dots[index].classList.remove('active-dot');
                    dots[index].classList.add('completed');
                    const fill = dots[index].querySelector('.fill');
                    fill.style.width = '100%';

                    let nextIndex = (index + 1) % totalSlides;
                    goToSlide(nextIndex);
                }, 5000);
            }

            // Инициализация: ставим все в стопку кроме первого
            slides.forEach((slide, i) => {
                if(i !== 0) {
                    slide.style.transform = 'translate3d(0, -40px, -900px) scale(0.7)';
                    slide.style.filter = 'blur(0px)';
                }
            });

            dots.forEach(dot => dot.classList.remove('active-dot', 'completed'));
            dots[0].classList.add('active-dot');
            const firstFill = dots[0].querySelector('.fill');
            firstFill.style.animation = `fillTimer 5s linear forwards`;

            setTimeout(() => {
                startTimer(0);
            }, 5000);

            // Видео логика
            const videos = document.querySelectorAll('video');
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.target.classList.contains('active')) {
                        const video = mutation.target.querySelector('video');
                        if (video) video.play().catch(e => {});
                    } else {
                        const video = mutation.target.querySelector('video');
                        if (video) { video.pause(); video.currentTime = 0; }
                    }
                });
            });

            slides.forEach(slide => {
                observer.observe(slide, { attributes: true, attributeFilter: ['class'] });
            });
            
            const firstVideo = slides[0].querySelector('video');
            if(firstVideo) firstVideo.play().catch(e => {});
        });
    </script>
</body>
</html>
